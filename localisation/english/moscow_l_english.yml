l_english:

 DOD_moscow.1.t: "Referendum in Tver"
 DOD_moscow.1.desc: "Moscow proposes that Tver join their state peacefully."
 DOD_moscow.1.a: "Yes, join Moscow"
 DOD_moscow.1.b: "No, remain independent"

 DOD_moscow.2.t: "Tver Accepts"
 DOD_moscow.2.desc: "Tver has agreed to join Moscow."
 DOD_moscow.2.a: "Excellent"

 DOD_moscow.3.t: "Tver Refuses"
 DOD_moscow.3.desc: "Tver has refused our proposal. How shall we respond?"
 DOD_moscow.3.a: "War it is"
 DOD_moscow.3.b: "We will back down"

 DOD_moscow.4.t: "A Royal Gift from the Moscow King"
 DOD_moscow.4.desc: "The King of Moscow has approached us with a royal gift, offering a symbol of friendship and unity between our peoples. This gesture may mark the beginning of closer cooperation and a shared future."

 DOD_moscow.4.a: "We will accept the gift"
 DOD_moscow.4.b: "We will politely deny"

DOD_moscow.5.t: "A Vote Forced Upon Us"
DOD_moscow.5.desc: "Moscow demands that we reform our government into a monarchy aligned with their vision. While some support this shift, others see it as foreign interference in our sovereignty."

DOD_moscow.5.a: "Accept the new order"
DOD_moscow.5.b: "We refuse Moscow's demands"

DOD_moscow.6.t: "Leningrad Refuses"
DOD_moscow.6.desc: "Leningrad has rejected our demands for governmental reform. We must now decide whether to enforce our will or accept their defiance."

DOD_moscow.6.a: "They will submit"
DOD_moscow.6.b: "We will stand down"

DOD_moscow.7.t: "Moscow Seeks Unity"
DOD_moscow.7.desc: "The Kingdom of Moscow invites us to join their growing alliance of monarchies."

DOD_moscow.7.a: "Join them"
DOD_moscow.7.b: "Refuse"

DOD_moscow.8.t: "Tver Refuses"
DOD_moscow.8.desc: "Tver has rejected our offer. Shall we enforce our will?"

DOD_moscow.8.a: "The power of the Old Kingdoms will not be undermined"
DOD_moscow.8.b: "Peace is almighty"

