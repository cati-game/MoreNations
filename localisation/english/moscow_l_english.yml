 # LEN invitation
 DOD_moscow.15.t: "Invitation from Moscow"
 DOD_moscow.15.desc: "The leadership in Moscow has extended an invitation for Leningrad to join the newly forming Moscow Union. Alignment with Moscow could bring security and prosperity, but refusal may carry risks."
 DOD_moscow.15.a: "We gladly accept the invitation."
 DOD_moscow.15.b: "We cannot commit to Moscow's faction."

 # LEN refusal response
 DOD_moscow.16.t: "Moscow Responds to Refusal"
 DOD_moscow.16.desc: "Leningrad's leadership has declined the invitation to join the Moscow Union. Moscow is weighing its options: enforce compliance or respect the refusal."
 DOD_moscow.16.a: "We will enforce compliance!"
 DOD_moscow.16.b: "We respect their decision, for now."
 
 # BLR invitation
 DOD_moscow.17.t: "Invitation from Moscow"
 DOD_moscow.17.desc: "Moscow has reached out to Belarus, proposing membership in the Moscow Union. Cooperation could strengthen both states, but refusal may provoke a firm response."
 DOD_moscow.17.a: "Belarus will join the Moscow Union."
 DOD_moscow.17.b: "Belarus must decline for now."
 
 # BLR refusal response
 DOD_moscow.18.t: "Moscow Responds to Refusal"
 DOD_moscow.18.desc: "Belarus has rejected Moscow's invitation to the Moscow Union. Moscow now must decide whether to assert its influence forcibly or allow Belarus to remain independent."
 DOD_moscow.18.a: "We will act to bring them into the fold!"
 DOD_moscow.18.b: "We will not push them for now."