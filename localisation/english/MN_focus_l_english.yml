 MOS_invite_tver:0 "Invite Tver"
 MOS_invite_karelia:0 "Invite Greater Karelia"
 MOS_royal_expansion:0 "Royal Expansion"
 MOS_royal_expansion_desc:0 "The King of Moscow seeks to strengthen his influence over neighboring states. By granting military and technological support, he demonstrates the strength and prestige of the monarchy."
 MOS_army_buildup:0 "Army Buildup"
 MOS_political_commissars:0 "Political commissars"
 MOS_the_moscow_red_army:0 "The Moscow Red Army"
 MOS_political_supremacism:0 "Political Supremacism"
 MOS_peoples_state:0 "People's State"
 MOS_total_control:0 "Total Control"
 MOS_workers_autonomy:0 "Workers Autonomy"
 MOS_create_moscow_union:0 "Create Moscow Union"
 MOS_red_terror:0 "Red Terror"
 MOS_kingly_visit:0 "Kingly Visit"
 MOS_kingly_visit_desc:0 "Our King will visit our neighbour Leningrad to improve relations and sway their people"
 MOS_invite_orel:0 "Invite Orel"
 MOS_industrial_effort:0 "Industrial Effort"
 MOS_industrial_effort_desc:0 "Focus all our political efforts on building up the civilian industry in a great leap forward."
 MOS_industrial_effort_2:0 "Industrial Effort II"
 MOS_industrial_effort_2_desc:0 "With iron will and a relentless work ethic, we can mobilize the people in another great industrial effort."
 MOS_construction_effort:0 "Construction Effort"
 MOS_construction_effort_tt:0 "Not enough building slots for §YCivilian Factories§!"
 MOS_construction_effort_desc:0 "Civilian industrial capacity must not be underestimated even when war looms over the world."
 MOS_production_effort:0 "Armament Effort"
 MOS_production_effort_tt:0 "Not enough building slots for §YMilitary Factory§!"
 MOS_production_effort_desc:0 "If you can build tractors, you can build tanks! We must not allow our military production capacity to lag behind."
 MOS_construction_effort_2:0 "Construction Effort II"
 MOS_construction_effort_2_desc:0 "Continuing to expand our factories will allow us to speed up production of goods for trade and further construction efforts."
 MOS_production_effort_2:0 "Armament Effort II"
 MOS_production_effort_2_desc:0 "Trying to adapt civilian factories to produce military equipment is inefficient. We should focus on preparing military production now."
 MOS_production_effort_3:0 "Armament Effort III"
 MOS_production_effort_3_desc:0 "Continued efforts to expand our military factories are necessary to meet the demands for new equipment."
 MOS_infrastructure_effort:0 "Infrastructure Effort"
 MOS_infrastructure_effort_desc:0 "A country without proper infrastructure cannot pursue advanced projects or constructions."
 MOS_infrastructure_effort_tt:0 "Not enough building slots for §YInfrastructure§!"
 synth_oil_effort_tt:0 "Not enough building slots for §YSynthetic Refinery§!"
 MOS_infrastructure_effort_2:0 "Infrastructure Effort II"
 MOS_infrastructure_effort_2_desc:0 "Extending our infrastructure further will enable the transports and communications necessary for high-tech clandestine projects."
 MOS_construction_effort_3:0 "Construction Effort III"
 MOS_construction_effort_3_desc:0 "Expansion of our infrastructure network has significantly improved our capacity for construction."
 MOS_nuclear_effort:0 "Nuclear Effort"
 MOS_nuclear_effort_desc:0 "Standing on the edge of a world-changing discovery, we cannot let others light the fire that may one day consume the Earth."
 MOS_extra_tech_slot:0 "Extra Research Slot"
 MOS_extra_tech_slot_desc:0 "Our industrial expansion and other recent advances might allow us to conduct more R&D in parallel."
 MOS_extra_tech_slot_2:0 "Extra Research Slot II"
 MOS_extra_tech_slot_2_desc:0 "The rapid industrialization of our nation has opened up new opportunities in R&D that we should pursue."
 MOS_technology_sharing:0 "Technology Sharing"
 MOS_technology_sharing_desc:0 "By sharing technological advances with our allies, our whole faction will be able to conduct wartime R&D more efficiently."
 MOS_secret_weapons:0 "Secret Weapons"
 MOS_secret_weapons_desc:0 "It is tempting to expend all extra resources into developing tanks and planes, but the secret to winning wars lies in whole new fields of science; electronics, rocketry and nuclear research."
